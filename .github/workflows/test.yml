name: Test

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  issues: write

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --group tests
      - run: uv run python -c "import polydrive; print(polydrive.__version__)"
      - run: set -o pipefail; uv run pytest -v --tb=long 2>&1 | tee pytest-output.txt
      - name: Create issue with failure details
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "## CI Test Failure"
            echo ""
            echo "**Commit:** ${{ github.sha }}"
            echo "**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            echo "### Full pytest output"
            echo ""
            echo '```'
            cat pytest-output.txt
            echo '```'
          } > /tmp/issue-body.md
          gh issue create \
            --title "CI test failure: ${{ github.sha }}" \
            --body-file /tmp/issue-body.md || true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --group lint
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  check:
    if: always()
    needs: [test, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
